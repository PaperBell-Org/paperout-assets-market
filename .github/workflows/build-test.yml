name: Build test (full PDF/DOCX)

# Heavy full-render build. Runs when a recipe/asset changes, and nightly. Installs
# XeLaTeX, so it's slower than the PR "Validate" smoke test — the full render is the
# authoritative proof each recipe produces a document.
on:
  pull_request:
    paths:
      - "filters/**"
      - "templates/**"
      - "csl/**"
      - "defaults/**"
      - "preamble.sty"
      - "catalog/recipes/**"
      - "scripts/build-recipe.mjs"
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  full-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "20.x"
          cache: "npm"
      - run: npm ci

      - name: Install pandoc + pandoc-crossref
        run: bash .github/scripts/install-pandoc.sh

      - name: Install XeLaTeX + CJK fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            texlive-xetex texlive-latex-extra texlive-fonts-recommended \
            texlive-lang-cjk fonts-noto-cjk latexmk unzip

      - name: Full build all recipes
        # Font-specific recipes (e.g. macOS Songti/Heiti) may fall back on Linux;
        # this job is informational for those and not a PR merge gate.
        run: node scripts/build-recipe.mjs --all --full
