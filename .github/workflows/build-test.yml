name: Build test (full PDF/DOCX)

# Full-render build: installs XeLaTeX and produces a real PDF/DOCX per recipe.
# Manual/on-demand only — NOT a PR gate. macOS-font recipes (Songti/Heiti, used by
# paperbell/pdf/cover_letter/...) can't render on a standard Linux runner, so this
# won't be fully green here. PRs rely on validate.yml's fingerprint smoke test
# (which proves the filter chain runs and is reproducible). Run this from an
# environment that has the required fonts (e.g. a macOS/self-hosted runner) for a
# fully green full-render result.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  full-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "20.x"
          cache: "npm"
      - run: npm ci

      - name: Install pandoc + pandoc-crossref
        run: bash .github/scripts/install-pandoc.sh

      - name: Install XeLaTeX + CJK fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            texlive-xetex texlive-latex-extra texlive-fonts-recommended \
            texlive-lang-cjk fonts-noto-cjk latexmk unzip

      - name: Full build all recipes
        # Font-specific recipes (e.g. macOS Songti/Heiti) may fall back on Linux;
        # this job is informational for those and not a PR merge gate.
        run: node scripts/build-recipe.mjs --all --full
