name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
      - "[0-9]+.[0-9]+.[0-9]+-*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: "20.x"
          cache: "npm"
      - run: npm ci

      - name: Ensure catalog versions match tag
        run: node scripts/check-versions.mjs "${GITHUB_REF#refs/tags/}"

      - name: Validate invariants + index (strict)
        run: node scripts/validate.mjs

      # Golden-fingerprint regression and full PDF/DOCX builds run on PRs
      # (validate.yml / build-test.yml), where the pandoc toolchain is installed.
      # The release job stays Node + zip only, so publishing never depends on a
      # pandoc version matching the goldens.

      - name: Pack bundles
        run: node scripts/pack-bundle.mjs --tag "${GITHUB_REF#refs/tags/}"

      - name: Build index.json
        run: node scripts/build-index.mjs --tag "${GITHUB_REF#refs/tags/}" --out dist/index.json

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          if [[ "$tag" == *-* ]]; then pre="--prerelease"; else pre=""; fi
          gh release create "$tag" \
            --title "$tag" \
            --notes "Release $tag" \
            $pre \
            dist/index.json dist/*.zip
