from: markdown+pipe_tables+table_captions+link_attributes+wikilinks_title_after_pipe
to: docx
standalone: true

# 指定 Pandoc 数据目录：当前 defaults 文件夹的上一级，即 pandoc 目录
data-dir: "${.}/.."

# Word 样式模板（manuscript-reference.docx 暂缺，先用 demo-reference.docx 占位）
reference-doc: "${.}/../templates/demo-reference.docx"

# 全局引文库（${USERDATA} = pandoc 目录；本仓库 mybib.bib 在 00 - Obsidian/mybib.bib）
# bibliography: "${USERDATA}/../../mybib.bib"  # (commented by sync: plugin injects --bibliography)

# 过滤器顺序（与 PR 217 demo-obsidian.yaml 一致，仅 demo-docx → manuscript-docx）：
# 1. pandoc-crossref 先处理图、表、公式编号与交叉引用
# 2. manuscript-docx.lua 把标题/作者/单位/通讯邮箱/摘要/关键词从 metadata 插入正文
# 3. citeproc 处理正文与插入内容中的文献引用（含摘要内引用）
# 4. 后续 Lua 做图表后置、行号、空格/标点清洗、表格宽度
filters:
  - pandoc-crossref
  - "${.}/../filters/manuscript-docx.lua"
  - citeproc
  - "${.}/../filters/figures-at-end.lua"
  - "${.}/../filters/lineno-docx.lua"
  - "${.}/../filters/nbsp-fix.lua"
  - "${.}/../filters/cjk_format.lua"
  - "${.}/../filters/fullwidth_tables.lua"

metadata:
  link-citations: false
  link-bibliography: false

  # 可在单篇文档 YAML 中打开：
  # lineno: true
  # figures-at-end: true
  # tables-at-end: true

  # 章节标题设置
  chapters: false
  chaptersDepth: 1
  numberSections: false
  chapDelim: "-"

  # 图表前缀设置
  figureTitle: "Fig"
  figPrefix: "Fig"
  tableTitle: "Tab"
  tblPrefix: "Tab"

# ============================================================
# manuscript-obsidian.yaml —— 学术稿件版（带作者/单位/通讯邮箱）
#
# 与 demo-obsidian.yaml 区别：
# - 走 manuscript-docx.lua 而非 demo-docx.lua，输出标题+作者+上标编号
#   +单位列表+通讯邮箱+摘要+关键词的标准期刊投稿头部排版
# - 适合 longform 编译产物（带 authors/affiliations frontmatter）
#
# manuscript-reference.docx 暂未到位，临时复用 demo-reference.docx
# ============================================================
